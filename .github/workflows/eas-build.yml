name: EAS Build & Update
on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g eas-cli
      - run: npm install --legacy-peer-deps
      - run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[build]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean
        env:
          EXPO_USE_PRECOMPILED_MODULES: "1"

      - name: Fix Kotlin version
        run: |
          sed -i 's/kotlinVersion = .*/kotlinVersion = "2.1.20"/' android/build.gradle
          echo "" >> android/build.gradle

      - name: Disable New Architecture
        run: |
          sed -i '/newArchEnabled/d' android/gradle.properties
          echo "" >> android/gradle.properties
          echo "newArchEnabled=false" >> android/gradle.properties
          cat android/gradle.properties

      - name: Downgrade Gradle wrapper ke 8.13
        run: |
          sed -i 's|distributionUrl=.*|distributionUrl=https\\://services.gradle.org/distributions/gradle-8.13-bin.zip|' android/gradle/wrapper/gradle-wrapper.properties
          cat android/gradle/wrapper/gradle-wrapper.properties

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon \
            -Pkotlin.version=2.1.20 \
            -Pandroid.suppressUnsupportedCompileSdk=35

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nefusoft-preview.apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 7
