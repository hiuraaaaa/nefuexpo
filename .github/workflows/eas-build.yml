name: EAS Build & Update
on:
  push:
    branches: [main]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g eas-cli
      - run: npm install --legacy-peer-deps
      - run: eas update --branch preview --message "${{ github.event.head_commit.message }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  build:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, '[build]')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: android-actions/setup-android@v3

      - run: npm install -g eas-cli
      - run: npm install --legacy-peer-deps

      - name: Prebuild Android
        run: npx expo prebuild --platform android --clean --no-install

      - name: Fix Kotlin version for gradle plugins
        run: sed -i 's/kotlinVersion = .*/kotlinVersion = "2.1.20"/' android/build.gradle || true

      - name: EAS Build (local)
        run: eas build -p android --profile preview --non-interactive --local
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_USE_PRECOMPILED_MODULES: "1"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: nefusoft-preview.apk
          path: "*.apk"
          retention-days: 7
